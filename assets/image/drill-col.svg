  <line x1="10" y1="14" x2="10" y2="28" stroke="#FF9030" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="49" y1="10" x2="49" y2="32" stroke="#FF9030" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="54" y1="14" x2="54" y2="28" stroke="#FF9030" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
