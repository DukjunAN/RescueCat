  <rect x="26" y="6"  width="5"  height="30" rx="2" fill="#FF9030"/>
  <rect x="33" y="6"  width="5"  height="30" rx="2" fill="#E07020"/>

  <!-- 손잡이 -->
  <circle cx="32" cy="11" r="7"  fill="#A04800"/>
  <circle cx="32" cy="11" r="4"  fill="#FF9030"/>
  <circle cx="32" cy="11" r="1.5" fill="#FFD080"/>

  <!-- 삼각 드릴 팁 (아래쪽) -->
