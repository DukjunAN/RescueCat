<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>🐱 고양이 탈출 대작전</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c678f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<script>
  (function() {
    var ua = navigator.userAgent;
    if (!/KAKAOTALK/.test(ua)) return;
    if (/Android/.test(ua)) {
      location.href = 'intent://' + location.host + location.pathname + '#Intent;scheme=https;package=com.android.chrome;end';
    } else if (/iPhone|iPad/.test(ua)) {
      document.addEventListener('DOMContentLoaded', function() {
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff6b6b;color:#fff;padding:14px 12px;text-align:center;z-index:99999;font-size:14px;font-family:sans-serif;line-height:1.4;';
        banner.innerHTML = '구글 로그인을 사용하려면<br>우측 하단 <b>···</b> → <b>Safari로 열기</b>를 눌러주세요';
        document.body.prepend(banner);
      });
    }
  })();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'SW_UPDATED') window.location.reload();
    });
  }
</script>
<script src="config/assets.js"></script>
<script src="config/levels.js"></script>
<script src="config/items.js"></script>
<script src="config/sounds.js"></script>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/specialTiles.css">
<script src="js/specialTiles.js"></script>
<script src="js/specialTileEffects.js"></script>
</head>
<body>

<!-- 가로 모드 회전 안내 (모바일 전용) -->
<div id="rotate-overlay">
  <div class="rotate-icon">📱</div>
  <p>세로 모드로 회전해주세요</p>
</div>

<div class="game-wrapper">
  <h1>🐱 고양이 <span>탈출</span> 대작전</h1>

  <div class="chase-scene" id="chase-scene">
    <div class="scene-star" style="left:10%;top:15%"></div>
    <div class="scene-star" style="left:30%;top:8%"></div>
    <div class="scene-star" style="left:55%;top:20%"></div>
    <div class="scene-star" style="left:75%;top:10%"></div>
    <div class="scene-star" style="left:90%;top:18%"></div>
    <div class="danger-bar-wrap"><div class="danger-bar" id="danger-bar"></div></div>
    <div class="escape-arrow">➡️</div>
    <canvas id="dragon-canvas" width="130" height="72"></canvas>
    <div class="exit-door">
      <div class="door-sign">EXIT</div>
      <div class="door-panel"></div>
      <div class="door-panel"></div>
      <div class="door-knob"></div>
    </div>
    <div class="barriers" id="barriers"></div>
    <canvas id="cat-canvas" width="96" height="96"></canvas>
  </div>

  <div class="hud">
    <div class="hud-card">
      <div class="hud-label">점수</div>
      <div class="hud-value" id="score-value">0</div>
    </div>
    <div class="hud-card timer-ring-wrap">
      <div class="hud-label">시간</div>
      <div class="hud-value" id="timer-value">30</div>
      <svg class="timer-ring" width="56" height="56" viewBox="0 0 56 56">
        <circle id="timer-ring-circle" cx="28" cy="28" r="25" transform="rotate(-90 28 28)"/>
      </svg>
    </div>
    <div class="hud-card">
      <div class="hud-label">레벨</div>
      <div class="hud-value" id="level-value">1</div>
    </div>
    <button class="hud-help-btn" id="tutorial-help-btn" title="특수 타일 안내">❓</button>
  </div>

  <div class="grid-container" id="grid">
    <div id="drill-subtitle" class="drill-subtitle hidden"></div>
  </div>

  <div class="controls">
    <button class="btn-sm" id="restart-btn">🔄 재시작</button>
    <button class="btn-sm" id="home-btn">🏠 홈으로</button>
  </div>
</div>

<div id="drag-ghost" style="display:none;width:52px;height:52px;"></div>

<!-- Loading overlay -->
<div class="load-overlay hidden" id="load-overlay">
  <div class="load-spinner"></div>
  <div class="load-text" id="load-text">레벨 1 로딩 중...</div>
  <div class="load-animals">
    <div class="load-slot" id="ls0"></div>
    <div class="load-slot" id="ls1"></div>
    <div class="load-slot" id="ls2"></div>
    <div class="load-slot" id="ls3"></div>
    <div class="load-slot" id="ls4"></div>
  </div>
</div>

<!-- Game Complete -->
<div class="overlay hidden" id="complete-overlay">
  <div class="overlay-box">
    <div class="complete-stars">⭐⭐⭐</div>
    <div class="overlay-title">전설 달성! 🏆</div>
    <div class="overlay-sub" id="complete-sub">100레벨을 모두 클리어했습니다!</div>
    <button class="btn" id="complete-btn">처음부터 다시 →</button>
  </div>
</div>

<!-- Title Screen -->
<div class="title-overlay" id="title-overlay">
  <div class="title-stars" id="title-stars"></div>
  <button id="settings-open-btn" title="설정">⚙️</button>
  <div class="title-logo">🐱 고양이<br><span>탈출</span> 대작전</div>
  <div class="title-logo-sub">드래곤에게서 야옹이를 구출하라!</div>
  <div class="title-cat-wrap">
    <canvas id="title-cat-canvas" width="144" height="132"></canvas>
    <div class="title-glow"></div>
  </div>
  <button class="title-btn" id="title-start-btn">🐾 게임 시작</button>
  <div class="title-best">최고 기록: <span id="title-best-score">-</span></div>
  <div class="title-best" id="title-continue-row" style="display:none">📍 이어하기: <span id="title-continue-level">-</span>레벨부터</div>

  <div class="title-auth" id="title-auth">
    <button class="title-google-btn" id="title-login-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google로 로그인
    </button>
    <div class="title-user" id="title-user" style="display:none">
      <img class="title-avatar" id="title-avatar" src="" alt="프로필">
      <span class="title-nickname" id="title-nickname"></span>
      <button class="title-logout-btn" id="title-logout-btn">로그아웃</button>
    </div>
  </div>

</div>

<!-- Tutorial overlay -->
<div class="overlay hidden" id="tutorial-overlay">
  <div class="tutorial-box">
    <div class="tutorial-header">
      <span class="tutorial-progress" id="tutorial-progress">1 / 6</span>
      <button class="tutorial-close-btn" id="tutorial-close-btn">✕</button>
    </div>
    <div id="tutorial-content"></div>
    <div class="tutorial-nav">
      <button class="btn-sm" id="tutorial-prev-btn">이전</button>
      <button class="btn" id="tutorial-next-btn">다음</button>
    </div>
  </div>
</div>

<!-- 설정 오버레이 -->
<div id="settings-overlay" class="hidden">
  <div class="settings-panel">
    <div class="settings-title">⚙️ 설정</div>

    <div class="settings-row">
      <span class="settings-icon">🔊</span>
      <span class="settings-label">소리</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="toggle-sound" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="settings-row">
      <span class="settings-icon">📳</span>
      <span class="settings-label">진동</span>
      <span class="settings-badge">준비중</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="toggle-vibration" disabled>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="settings-row">
      <span class="settings-icon">🌐</span>
      <span class="settings-label">언어 (한글 / English)</span>
      <span class="settings-badge">준비중</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="toggle-lang" disabled>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="settings-row">
      <span class="settings-icon">📖</span>
      <span class="settings-label">튜토리얼 초기화</span>
      <button class="settings-action-btn" id="reset-tutorial-btn">초기화</button>
    </div>

    <div class="settings-row">
      <span class="settings-icon">🎯</span>
      <span class="settings-label">레벨 이동 <span class="settings-badge">테스트</span></span>
      <div style="display:flex;gap:6px;align-items:center;margin-left:auto;">
        <select id="level-jump-select" class="level-jump-select">
          <option value="1">1</option>
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="110">110</option>
          <option value="120">120</option>
          <option value="130">130</option>
          <option value="140">140</option>
          <option value="150">150</option>
        </select>
        <button class="settings-action-btn" id="level-jump-go-btn">이동</button>
      </div>
    </div>

    <button class="settings-close-btn" id="settings-close-btn">확인</button>
  </div>
</div>

<div class="overlay hidden" id="win-overlay">
  <div class="overlay-box">
    <canvas id="win-cat-canvas" width="120" height="110" style="display:block;margin:0 auto 8px;"></canvas>
    <div class="overlay-title">탈출 성공! 🎉</div>
    <div class="overlay-sub" id="win-sub">야옹이가 도망쳤어요!</div>
    <button class="btn" id="next-btn">다음 레벨 →</button>
  </div>
</div>
<div class="overlay hidden" id="lose-overlay">
  <div class="overlay-box">
    <div class="overlay-emoji">🐉</div>
    <div class="overlay-title" id="lose-title">잡혔다!</div>
    <div class="overlay-sub" id="lose-sub">용이 야옹이를 잡았어요!</div>
    <button class="btn" id="retry-btn">다시 도전 🔄</button>
  </div>
</div>

<!-- ── 새로 분리된 JS 파일들 (의존성 순서) ── -->
<script src="js/debug.js"></script>
<script src="js/audioManager.js"></script>
<script src="js/chaseScene.js"></script>
<script src="js/hintSystem.js"></script>
<script src="js/hud.js"></script>
<script src="js/input.js"></script>
<script src="js/boardLogic.js"></script>
<script src="js/titleScreen.js"></script>
<script src="js/settings.js"></script>
<script src="js/game.js"></script>

<button id="debug-toggle" onclick="document.getElementById('debug-panel').classList.toggle('hidden')" style="display:none">🔍 LOG</button>
<script>if (typeof DEBUG_LOG_ENABLED !== 'undefined' && DEBUG_LOG_ENABLED) document.getElementById('debug-toggle').style.display = '';</script>
<div id="debug-panel" class="hidden">
  <div id="debug-header">
    <span id="debug-count">0건</span>
    <button id="debug-clear" onclick="document.getElementById('debug-log').innerHTML='';_dbCount=0;document.getElementById('debug-count').textContent='0건'">초기화</button>
  </div>
  <div id="debug-log"></div>
</div>

<script src="js/version.js"></script>
<script src="js/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/tutorialSlides.js"></script>
<script>
  (function() {
    const v = window.APP_VERSION || '?';
    const btn = document.getElementById('debug-toggle');
    if (btn) btn.textContent = `🔍 LOG ${v}`;
    const panel = document.querySelector('.settings-panel');
    if (panel) {
      const el = document.createElement('div');
      el.style.cssText = 'text-align:center;color:#8b6aaa;font-size:.7rem;margin-top:12px;';
      el.textContent = `v ${v}`;
      panel.appendChild(el);
    }
    if (typeof gameLog === 'function') gameLog('LEVEL', `🚀 앱 버전: ${v}`);
  })();
</script>
</body>
</html>
