<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Kitten 스프라이트 테스트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0a2e; color: #e0c8f0; font-family: 'Segoe UI', sans-serif; padding: 24px; }
  h1 { text-align: center; color: #c678f0; margin-bottom: 24px; font-size: 1.5rem; }

  .groups { display: flex; flex-wrap: wrap; gap: 24px; justify-content: flex-start; align-items: flex-start; }

  .group {
    background: #2d1b4e; border: 1px solid #4a2d7a; border-radius: 14px;
    padding: 20px; width: 220px; flex-shrink: 0;
  }
  .group-title {
    font-size: .95rem; font-weight: 700; color: #f5c842;
    margin-bottom: 12px; text-align: center;
  }

  /* 애니메이션 프리뷰 */
  .preview-box {
    width: 100%; aspect-ratio: 1;
    border-radius: 10px; border: 2px solid #4a2d7a;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; overflow: hidden;
  }
  .preview-box.bg-dark  { background: #0d0722; }
  .preview-box.bg-mid   { background: #4a3060; }
  .preview-box.bg-light { background: #c8b0e0; }
  .preview-box.bg-white { background: #ffffff; }
  .preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }

  /* 컨트롤 */
  .controls { display: flex; flex-direction: column; gap: 7px; font-size: .8rem; margin-bottom: 14px; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; }
  .ctrl-row label { color: #a080c0; min-width: 36px; }
  .ctrl-row input[type=range] { flex: 1; accent-color: #c678f0; }
  .ctrl-row span { min-width: 28px; text-align: right; color: #f5c842; }

  .btn-row { display: flex; gap: 6px; }
  .btn {
    flex: 1; padding: 5px 4px; border-radius: 7px; border: 1px solid #4a2d7a;
    background: #3d2060; color: #c8a0e0; cursor: pointer; font-size: .75rem;
  }
  .btn:hover { background: #5a3090; color: #fff; }
  .btn.active { background: #7a40b0; color: #fff; border-color: #c678f0; }

  .bg-btns { display: flex; gap: 5px; }
  .bg-btn {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: border-color .15s;
  }
  .bg-btn.selected { border-color: #f5c842; }
  .bg-btn.dark  { background: #0d0722; }
  .bg-btn.mid   { background: #4a3060; }
  .bg-btn.light { background: #c8b0e0; }
  .bg-btn.white { background: #ffffff; }

  .frame-info { text-align: center; font-size: .72rem; color: #7060a0; margin-top: 2px; }

  /* 세로 프레임 목록 */
  .frame-list {
    display: flex; flex-direction: column; gap: 6px;
    border-top: 1px solid #3d2060; padding-top: 12px;
  }
  .frame-row {
    display: flex; align-items: center; gap: 10px;
    border-radius: 8px; padding: 4px 6px; cursor: pointer;
    border: 2px solid transparent; transition: border-color .1s;
    background: #1e0e38;
  }
  .frame-row:hover { border-color: #7a40b0; }
  .frame-row.active { border-color: #f5c842; background: #2a1450; }
  .frame-num { font-size: .72rem; color: #7060a0; min-width: 20px; text-align: right; }
  .frame-img-wrap {
    width: 80px; height: 80px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0d0722; border-radius: 6px; overflow: hidden;
  }
  .frame-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }
  .frame-name { font-size: .68rem; color: #9080b0; word-break: break-all; }

  /* 좌우 반전 */
  .flipped img { transform: scaleX(-1); }

  #flip-btn {
    display: block; margin: 0 auto 20px;
    padding: 8px 24px; border-radius: 10px;
    border: 2px solid #4a2d7a; background: #3d2060;
    color: #c8a0e0; font-size: .9rem; cursor: pointer;
    font-family: 'Segoe UI', sans-serif; transition: background .15s;
  }
  #flip-btn:hover { background: #5a3090; color: #fff; }
  #flip-btn.on { background: #7a40b0; color: #fff; border-color: #c678f0; }
</style>
</head>
<body>
<h1>🐱 Tiny Kitten 스프라이트 테스트</h1>
<button id="flip-btn">↔ 좌우 반전 OFF</button>
<div class="groups" id="groups"></div>

<script>
const ANIMS = [
  { label: '01_Idle (12프레임)',            base: 'assets/image/tiny_kitten/01_Idle/',            prefix: '__Cat_Idle_',     count: 12, fps: 10 },
  { label: '02_Run (10프레임)',             base: 'assets/image/tiny_kitten/02_Run/',             prefix: '__Cat_Run_',      count: 10, fps: 12 },
  { label: '03_Jump / 01_Up (5프레임)',     base: 'assets/image/tiny_kitten/03_Jump/01_Up/',     prefix: '__Cat_JumpUp_',   count:  5, fps:  8 },
  { label: '03_Jump / 02_Fall (5프레임)',   base: 'assets/image/tiny_kitten/03_Jump/02_Fall/',   prefix: '__Cat_JumpFall_', count:  5, fps:  8 },
  { label: '04_Hurt (6프레임)',             base: 'assets/image/tiny_kitten/04_Hurt/',            prefix: '__Cat_Hurt_',     count:  6, fps: 10 },
  { label: '05_Dead (8프레임)',             base: 'assets/image/tiny_kitten/05_Dead/',            prefix: '__Cat_Dead_',     count:  8, fps:  8 },
];

const BACKGROUNDS = ['dark', 'mid', 'light', 'white'];

function pad3(n) { return String(n).padStart(3, '0'); }

function buildGroup(anim, container) {
  let fps = anim.fps;
  let playing = true;
  let curFrame = 0;
  let timer = null;

  const frames = Array.from({ length: anim.count }, (_, i) =>
    anim.base + anim.prefix + pad3(i) + '.png'
  );

  const div = document.createElement('div');
  div.className = 'group';

  div.innerHTML = `
    <div class="group-title">${anim.label}</div>
    <div class="preview-box bg-dark" id="box-${anim.prefix}">
      <img id="preview-${anim.prefix}" src="${frames[0]}" alt="frame">
    </div>
    <div class="controls">
      <div class="ctrl-row">
        <label>FPS</label>
        <input type="range" id="fps-${anim.prefix}" min="1" max="30" value="${fps}">
        <span id="fps-val-${anim.prefix}">${fps}</span>
      </div>
      <div class="ctrl-row">
        <label>배경</label>
        <div class="bg-btns" id="bg-${anim.prefix}">
          ${BACKGROUNDS.map((b, i) => `<div class="bg-btn ${b}${i===0?' selected':''}" data-bg="${b}"></div>`).join('')}
        </div>
      </div>
      <div class="btn-row">
        <button class="btn active" id="play-${anim.prefix}">⏸ 정지</button>
        <button class="btn" id="prev-${anim.prefix}">◀</button>
        <button class="btn" id="next-${anim.prefix}">▶</button>
      </div>
      <div class="frame-info" id="finfo-${anim.prefix}">프레임 1 / ${anim.count}</div>
    </div>
    <div class="frame-list" id="strip-${anim.prefix}"></div>
  `;

  container.appendChild(div);

  const previewImg = div.querySelector(`#preview-${anim.prefix}`);
  const box        = div.querySelector(`#box-${anim.prefix}`);
  const finfo      = div.querySelector(`#finfo-${anim.prefix}`);
  const strip      = div.querySelector(`#strip-${anim.prefix}`);
  const playBtn    = div.querySelector(`#play-${anim.prefix}`);
  const prevBtn    = div.querySelector(`#prev-${anim.prefix}`);
  const nextBtn    = div.querySelector(`#next-${anim.prefix}`);
  const fpsRange   = div.querySelector(`#fps-${anim.prefix}`);
  const fpsVal     = div.querySelector(`#fps-val-${anim.prefix}`);
  const bgBtns     = div.querySelectorAll(`#bg-${anim.prefix} .bg-btn`);

  // 세로 프레임 목록 생성
  frames.forEach((src, i) => {
    const row = document.createElement('div');
    row.className = 'frame-row' + (i === 0 ? ' active' : '');
    const fileName = src.split('/').pop();
    row.innerHTML = `
      <span class="frame-num">${i}</span>
      <div class="frame-img-wrap"><img src="${src}" alt="f${i}"></div>
      <span class="frame-name">${fileName}</span>
    `;
    row.addEventListener('click', () => {
      setFrame(i);
      if (playing) { stopAnim(); playing = false; playBtn.textContent = '▶ 재생'; playBtn.classList.remove('active'); }
    });
    strip.appendChild(row);
  });

  const rows = strip.querySelectorAll('.frame-row');

  function setFrame(i) {
    curFrame = (i + frames.length) % frames.length;
    previewImg.src = frames[curFrame];
    finfo.textContent = `프레임 ${curFrame + 1} / ${anim.count}`;
    rows.forEach((r, j) => r.classList.toggle('active', j === curFrame));
  }

  function startAnim() {
    stopAnim();
    timer = setInterval(() => setFrame(curFrame + 1), 1000 / fps);
  }

  function stopAnim() {
    if (timer) { clearInterval(timer); timer = null; }
  }

  startAnim();

  playBtn.addEventListener('click', () => {
    playing = !playing;
    if (playing) { startAnim(); playBtn.textContent = '⏸ 정지'; playBtn.classList.add('active'); }
    else { stopAnim(); playBtn.textContent = '▶ 재생'; playBtn.classList.remove('active'); }
  });

  prevBtn.addEventListener('click', () => setFrame(curFrame - 1));
  nextBtn.addEventListener('click', () => setFrame(curFrame + 1));

  fpsRange.addEventListener('input', () => {
    fps = parseInt(fpsRange.value);
    fpsVal.textContent = fps;
    if (playing) startAnim();
  });

  bgBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      box.classList.remove(...BACKGROUNDS.map(b => 'bg-' + b));
      box.classList.add('bg-' + btn.dataset.bg);
      bgBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
}

const container = document.getElementById('groups');
ANIMS.forEach(anim => buildGroup(anim, container));

// 좌우 반전 토글
let flipped = false;
document.getElementById('flip-btn').addEventListener('click', () => {
  flipped = !flipped;
  const btn = document.getElementById('flip-btn');
  btn.textContent = flipped ? '↔ 좌우 반전 ON' : '↔ 좌우 반전 OFF';
  btn.classList.toggle('on', flipped);
  document.getElementById('groups').classList.toggle('flipped', flipped);
});
</script>
</body>
</html>
